# 蟾ｦ蛛ｴ縺ｫ蜈ｨ縺ｦ陦ｨ遉ｺ縲｝owerline 荳ｸ縺ｿ繧ｹ繧ｿ繧､繝ｫ
format = """[薰ｶ](fg:#4C566A)$directory[薰ｰ](fg:#4C566A bg:#5E81AC)${custom.git_info}[薰ｰ](fg:#5E81AC bg:#A3BE8C)$time[薰ｰ](fg:#A3BE8C) $character"""

right_format = ""

[character]
success_symbol = "[笶ｯ](bold green)"
error_symbol = "[笶ｯ](bold red)"

[time]
disabled = false
time_format = "%R"
style = "bg:#A3BE8C fg:#1E1E2E"
format = "[ $time ]($style)"

[directory]
style = "bg:#4C566A fg:#ECEFF4"
format = "[$path ]($style)"
truncation_length = 3
truncate_to_repo = true

[git_branch]
disabled = true

[git_status]
disabled = true

[custom.git_info]
command = 'branch=$(git branch --show-current 2>/dev/null); git status --porcelain 2>/dev/null | grep -qm1 . && echo "${branch}*" || echo "$branch"'
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bg:#5E81AC fg:#ECEFF4"
format = "[ $output ]($style)"

[line_break]
disabled = true
[gcloud]
disabled = true
[aws]
disabled = true
