# 蟾ｦ蛛ｴ縺ｫ蜈ｨ縺ｦ陦ｨ遉ｺ縲｝owerline 荳ｸ縺ｿ繧ｹ繧ｿ繧､繝ｫ
format = """[蟬ｶ](fg:#4C566A)$directory[蟬ｰ](fg:#4C566A bg:#5E81AC)${custom.git_info}[蟬ｰ](fg:#5E81AC bg:#B48EAD)$time[蟬ｰ](fg:#B48EAD bg:#EBCB8B)$battery[蟬ｰ](fg:#EBCB8B) $character"""

right_format = ""

[character]
success_symbol = "[笶ｯ](bold green)"
error_symbol = "[笶ｯ](bold red)"

[battery]
full_symbol = "㬚∋ "
charging_symbol = "㬚ｄ "
discharging_symbol = "㬚ｃ "
format = "[ $percentage ]($style)"

[[battery.display]]
threshold = 30
style = "bg:#F38BA8 fg:#1E1E2E"

[[battery.display]]
threshold = 100
style = "bg:#EBCB8B fg:#1E1E2E"

[time]
disabled = false
time_format = "%R"
style = "bg:#B48EAD fg:#1E1E2E"
format = "[ $time ]($style)"

[directory]
style = "bg:#4C566A fg:#ECEFF4"
format = "[$path ]($style)"
truncation_length = 3
truncate_to_repo = true

[git_branch]
disabled = true

[git_status]
disabled = true

[custom.git_info]
command = 'branch=$(git branch --show-current 2>/dev/null); git status --porcelain 2>/dev/null | grep -qm1 . && echo "${branch}*" || echo "$branch"'
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bg:#5E81AC fg:#ECEFF4"
format = "[ $output ]($style)"

[line_break]
disabled = true
[gcloud]
disabled = true
[aws]
disabled = true
