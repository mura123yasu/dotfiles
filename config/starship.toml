# 左側に全て表示、powerline 丸みスタイル
format = """[](fg:#4C566A)$directory[](fg:#4C566A bg:#5E81AC)$git_branch$custom[](fg:#5E81AC bg:#B48EAD)$time[](fg:#B48EAD bg:#EBCB8B)$battery[](fg:#EBCB8B) $character"""

right_format = ""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
format = "[ $percentage ]($style)"

[[battery.display]]
threshold = 30
style = "bg:#F38BA8 fg:#1E1E2E"

[[battery.display]]
threshold = 100
style = "bg:#EBCB8B fg:#1E1E2E"

[time]
disabled = false
time_format = "%R"
style = "bg:#B48EAD fg:#1E1E2E"
format = "[ $time ]($style)"

[directory]
style = "bg:#4C566A fg:#ECEFF4"
format = "[$path ]($style)"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "bg:#5E81AC fg:#ECEFF4"
format = "[ $branch]($style)"

[git_status]
disabled = true

[custom.git_dirty]
command = "echo '*'"
when = "git status --porcelain 2>/dev/null | grep -qm1 ."
style = "bg:#5E81AC fg:#ECEFF4"
format = "[$output ]($style)"

[line_break]
disabled = true
[gcloud]
disabled = true
[aws]
disabled = true
